<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>48 - Table Footer</title>
  </head>
  <body>
    <table style="width:50%;" border="1px;">
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Job</th>
        <th>Department</th>
        <th>Salary </th>
      </tr>
      <tr>
        <td>John</td>
        <td>30</td>
        <td>Engineer</td>
        <td>Development</td>
        <td>$5000</td>
      </tr>
      <tr>
        <td>Jane</td>
        <td>25</td>
        <td>Designer</td>
        <td rowspan="2">Design</td>
        <td>$4000</td>
      </tr>
      <tr>
        <td>Mike</td>
        <td>35</td>
        <td>UX</td>
        <!-- <td>Design</td> -->
        <td>$6000</td>
      </tr>
      <tr>
        <td>Emily</td>
        <td>28</td>
        <td>Analyst</td>
        <td>Research</td>
        <td>$4500</td>
      </tr>
      <tr>
        <td>David</td>
        <td>32</td>
        <td>Consultant</td>
        <td>Business</td>
        <td>$5500</td>  
      </tr>
      <tfoot>
        <td colspan="4" style="text-align: center;"><strong>Total</strong></td>
        <td><strong>$25,500</strong></td>
      </tfoot>
    </table>
  </body>
</html>
