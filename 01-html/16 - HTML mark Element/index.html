<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 - HTML mark Element</title>
</head>
<body>
    <p>hello my favorite number is <mark>4</mark></p>
    <p>this is normal text</p>
    <p><mark>this is mark text</mark></p>
    <p>hello <mark>world</mark></p>
    <p>hello <mark>world</mark></p>
    <p>hello <mark>world</mark></p>
</body>
</html>
