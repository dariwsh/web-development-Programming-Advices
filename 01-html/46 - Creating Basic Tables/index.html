<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>46 - Creating Basic Tables</title>
  </head>
  <body>
    <p>
        The following table shows a list of employees:
    </p>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Job</th>
            <th>Salary</th>
        </tr>
        <tr>
            <td>John Doe</td>
            <td>30</td>
            <td>Software Engineer</td>
            <td>$80,000</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>28</td>
            <td>Data Analyst</td>
            <td>$70,000</td>
        </tr>
        <tr>
            <td>Mike Johnson</td>
            <td>35</td>
            <td>Project Manager</td>
            <td>$90,000</td>
        </tr>

        </table>
  </body>
</html>
