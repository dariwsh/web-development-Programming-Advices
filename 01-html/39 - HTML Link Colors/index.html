<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39 - HTML Link Colors</title>
</head>
<body>
    <p>
         Visit our <a href="https://www.ProgrammingAdvices.com">Homepage</a> to learn more.
    </p>
    <p>
        vist our
        <a href="https://www.programmingAdvices.com" 
        style=" color:blue;"
        onmouseover="this.style.color='red';"
        onmouseout="this.style.color='blue';"
        onmousedown="this.style.color='green';"
        onmouseup="this.style.color='red';"
        >Homepage</a> to learn more.
    </p>
</body>
</html>
