<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>25 - What is iFrame</title>
  </head>
  <body>
    <p>Default Borders</p>
    <iframe src="page1.html" title="Page 1"></iframe>
    <iframe src="page2.html" title="Page 2"></iframe>
    <p>Custom Borders</p>
    <iframe
      src="page1.html"
      title="Page 1"
      loading="lazy"
      style="border: 2px solid #c02020"
    ></iframe>
    <iframe
      src="page2.html"
      title="Page 2"
      loading="lazy"
      style="border: 2px solid #9b1212"
    ></iframe>
    <p>Changing width and height</p>
    <iframe
      src="page1.html"
      title="Page 1"
      loading="lazy"
      width="500"
      height="600"
    ></iframe>
    <iframe
      src="page2.html"
      title="Page 2"
      loading="lazy"
      width="500"
      height="600"
    ></iframe>

    <p>url ifarme</p>
    <iframe
      width="700"
      height="600"
      src="https://www.youtube.com/embed/9KvR1rGE9FU?si=gcIq2dEHPeltndmq"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    >
    </iframe>

    <!-- Google Maps embed -->
    <iframe
      width="600"
      height="450"
      src="https://www.google.com/maps/embed?pb=..."
      allowfullscreen=""
      loading="lazy"
    >
    </iframe>

    <!-- Google Maps embed -->
    <iframe
      width="600"
      height="450"
      src="https://www.google.com/maps/embed?pb=..."
      allowfullscreen=""
      loading="lazy"
    >
    </iframe>
  </body>
</html>
