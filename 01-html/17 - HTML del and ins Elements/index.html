<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>17 - HTML del and ins Elements</title>
  </head>
  <body>
    <p>i like <del>apple</del> <ins>banana</ins></p>
    <p>~~this is deleted text~~</p>
    <p><u>this is inserted text</u></p>
    <p>hello <del>world</del> <ins>beautiful world</ins></p>
  </body>
</html>
