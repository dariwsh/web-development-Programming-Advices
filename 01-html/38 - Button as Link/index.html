<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>38 - Button as Link</title>
  </head>
  <body>
    <h1>Button as Link</h1>
    <p>Click the button to below to vist programming advice</p>
    <P> 
      <button onclick="window.location.href='https://www.programmingAdvices.com';">Visit Programming Advices</button>
    </P>

     <P> 
      <button onclick="window.open('https://www.programmingAdvices.com' , '_blank');">Visit Programming Advices</button>
    </P>

     <P> 
      <button onclick="window.open('https://www.programmingAdvices.com' , '_blank' , 'width=800,height=600');">Visit Programming Advices</button>
    </P>
  </body>
</html>
