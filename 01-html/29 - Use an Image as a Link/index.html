<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29 - Use an Image as a Link</title>
</head>
<body>
    <div>
        <a href="https://www.ManagementDose.com " target="_blank" title="To Learn More about our website.">
            <img src="ManagementDose.png"
            title="Management Dose"
            width="200" height="200"
             alt="Management Dose">
        </a>
        <a href="https://www.ProgrammingAdvices.com " target="_blank" title="To Learn More about our website.">
            <img src="ProgrammingAdvices.png"
            title="Programming Advices"
            width="200" height="200"
             alt="Programming Advices">
        </a>
    </div>

</body>
</html>
