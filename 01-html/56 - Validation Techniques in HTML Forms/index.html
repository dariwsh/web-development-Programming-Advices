<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>56 - Validation Techniques in HTML Forms</title>
  </head>
  <body>
    <form id="registrationForm" action="Destination.html" method="post">
      <!-- Email input       -->
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        required
        placeholder="Enter a valid email"
      /><br />
      <!-- Age -->
      <label for="age">Age:</label>
      <input
        type="number"
        id="age"
        name="age"
        min="18"
        max="40"
        required
        placeholder="Enter your age (18-40)"
      /><br />
      <!-- Password input -->
      <label for="password">Password:</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        pattern=".{8,}"
        placeholder="Enter a password with at least 8 characters"
      /><br />
      <!-- Confirm Password input -->
      <label for="confirmPassword">Confirm Password:</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        required
        pattern=".{8,}"
        placeholder="Confirm your password"
      /><br />

      <!-- Date of Birth input -->
      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob" required />
      <br /><br />
      <!-- Color input -->
      <label for="favoriteColor">Favorite Color:</label>
      <input type="color" id="favoriteColor" name="favoriteColor" required />
      <br /><br />

      <!-- Submit button -->
      <button type="submit">Register</button>
    </form>
  </body>
</html>
